server:
  port: ${SERVER_PORT:8765}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: flow-manager-submit
          uri: lb://flow-manager
          predicates:
            - Path=/api/v1/conversions
            - Method=POST
        - id: flow-manager-query
          uri: lb://flow-manager
          predicates:
            - Path=/api/v1/conversions/**
            - Method=GET

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    instance-id: ${spring.application.name}:${random.value}